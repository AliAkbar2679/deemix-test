name: Build and Publish Electron GUI

on:
  workflow_dispatch:
  push:
    tags:
      - deemix-gui@*
  pull_request:
    branches:
      - main
    paths:
      - packages/gui/*
      - .github/workflows/build-release-electron.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build-release-electron:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-2022]

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install distutils
        run: |
          python -m pip install --upgrade pip
          pip install setuptools

      - name: Set PYTHON env var (Windows)
        if: matrix.os == 'windows-2022'
        run: |
          $pythonPath = (Get-Command python.exe -ErrorAction SilentlyContinue).Source
          if (-not $pythonPath) { $pythonPath = (where.exe python.exe | Select-Object -First 1) }
          echo "PYTHON=$pythonPath" >> $env:GITHUB_ENV

      # Sets the PYTHON env var safely on macOS/Linux (Bash)
      - name: Set PYTHON env var (Unix)
        if: matrix.os != 'windows-2022'
        run: echo "PYTHON=$(which python)" >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # 1. Install all monorepo dependencies safely using your pnpm-lock.yaml
      - name: Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      # 2. Build the dependencies first (like webui) so the GUI package has assets to copy
      - name: Build Web UI assets
        run: pnpm --filter deemix-webui build

      # 3. Build the main/preload TS modules inside the gui directory 
      - name: Build Electron Main Source
        run: pnpm --filter deemix-gui build

      # 4. Trigger Electron Forge via pnpm filtering inside its proper package path
      - name: Run Electron Forge Make
        run: pnpm --filter deemix-gui make

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            packages/gui/out/**/Deemix.exe
            packages/gui/out/**/Deemix*Setup.exe
            packages/gui/out/make/zip/**/*.zip
            packages/gui/out/make/deb/**/*.deb
