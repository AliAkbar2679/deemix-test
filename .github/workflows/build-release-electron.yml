name: Build and Publish Electron GUI

on:
  workflow_dispatch:
  push:
    tags:
      - 'deemix-gui@*'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/gui/**'
      - '.github/workflows/build-release-electron.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  build-release-electron:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-2022]

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install distutils
        run: |
          python -m pip install --upgrade pip
          pip install setuptools

      - name: Set PYTHON env var (Unix)
        if: matrix.os != 'windows-2022'
        run: echo "PYTHON=$(which python)" >> $GITHUB_ENV

      - name: Set PYTHON env var (Windows)
        if: matrix.os == 'windows-2022'
        run: echo "PYTHON=$env:PythonExe" >> $GITHUB_ENV

      - run: pnpm install --frozen-lockfile

      # CRITICAL NEW STEP: This builds all packages (including webui) in the correct order
      - name: Build all project workspaces
        run: pnpm -r run build

      # Rebuild Native Modules inside the package context
      - name: Rebuild Native Modules
        run: pnpm --filter deemix-gui exec electron-rebuild

      # Run the make command scoped to your GUI package
      - name: Package App
        run: pnpm --filter deemix-gui run make

      # Upload files using absolute paths relative to root workspace
      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            packages/gui/out/make/**/*.exe
            packages/gui/out/make/zip/**/*.zip
            packages/gui/out/make/deb/**/*.deb
            packages/gui/out/make/dmg/**/*.dmg
